title: AI Media Wiki
description: ShruggieTech's internal reference for AI media tooling (ComfyUI, Ollama, and more).

# Branch build (publishing from main /docs) cannot use the just-the-docs gem
# theme directly, so the theme loads through remote_theme instead.
remote_theme: just-the-docs/just-the-docs@v0.12.0

# --- EDIT THESE TWO LINES ---
# `url` is your Pages root: https://<org-or-user>.github.io
# `baseurl` is the repo name with a leading slash (this is a project site).
# Note: /docs is only the SOURCE location. The published URL is still the repo
# root, so baseurl stays /ai-media-wiki, not /ai-media-wiki/docs.
url: https://shruggietech.github.io
baseurl: /ai-media-wiki
# ----------------------------

# Plugins available on the GitHub Pages branch build.
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  rel_url: true

# Top-right repo link
aux_links:
  Repository: https://github.com/shruggietech/ai-media-wiki
aux_links_new_tab: true

# "Edit this page on GitHub" links.
# gh_edit_source MUST be set to docs because the site source lives there;
# without it the edit links 404.
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/shruggietech/ai-media-wiki"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Code copy button
enable_copy_code_button: true
